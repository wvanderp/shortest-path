name: Coordinate Preview Comment

# Posts / updates the coordinate preview comment on PRs.
# Runs after the unprivileged "Coordinate Preview" workflow completes, so it
# has pull-requests:write without ever executing PR code.
on:
  workflow_run:
    workflows: ["Coordinate Preview"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post Preview Comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download preview results
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const match = artifacts.data.artifacts.find(a => a.name === 'coordinate-preview-results');
            if (!match) {
              core.info('No coordinate-preview-results artifact — nothing to comment.');
              core.exportVariable('SKIP_COMMENT', 'true');
              return;
            }
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: match.id,
              archive_format: 'zip',
            });
            const fs = require('fs');
            fs.writeFileSync('${{ github.workspace }}/artifact.zip', Buffer.from(download.data));

      - name: Unpack artifact
        if: env.SKIP_COMMENT != 'true'
        run: |
          unzip artifact.zip -d artifact

      - name: Post or update comment
        if: env.SKIP_COMMENT != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('artifact/pr-number.txt', 'utf8').trim(), 10);

            if (isNaN(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid PR number: ${prNumber}`);
              return;
            }

            const manifest = JSON.parse(fs.readFileSync('artifact/manifest.json', 'utf8'));

            const MARKER = '<!-- osrs-coordinate-preview -->';
            const IMAGE_WIDTH = 220;

            function escCell(s) {
              return String(s).replace(/\|/g, '\\|').replace(/\n/g, ' ');
            }
            function escAttr(s) {
              return String(s).replace(/"/g, '&quot;');
            }

            const lines = [
              MARKER,
              '## OSRS coordinate previews',
              '',
              `Rendered ${manifest.renderCount} preview(s); ${manifest.failedCount} failure(s).`,
              '',
              '| Preview | Item | Coordinate | Source |',
              '| --- | --- | --- | --- |',
            ];

            for (const item of manifest.items) {
              const title  = item.label || item.id;
              const source = item.source || '';
              const coord  = item.coordinate || '';
              let preview  = '';

              if (item.status === 'success' && item.imageUrl) {
                const url = item.imageUrl;
                preview = `<a href="${url}"><img src="${url}" alt="${escAttr(title)}" width="${IMAGE_WIDTH}" /></a>`;
              } else if (item.status === 'failure') {
                preview = escCell(`failed: ${item.error || ''}`);
              }

              lines.push(`| ${preview} | ${escCell(title)} | ${escCell(coord)} | ${escCell(source)} |`);
            }

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated comment #${existing.id} on PR #${prNumber}.`);
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created new comment on PR #${prNumber}.`);
            }
