name: Coordinate Preview Comment

# Renders coordinate previews and posts / updates the comment on PRs.
# Runs after the unprivileged "Coordinate Preview" workflow completes, so it
# has pull-requests:write without ever executing PR code.
on:
  workflow_run:
    workflows: ["Coordinate Preview"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    name: Render and Post Preview Comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check for coordinate results artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const match = artifacts.data.artifacts.find(a => a.name === 'coordinate-preview-results');
            if (!match) {
              core.info('No coordinate-preview-results artifact — nothing to render.');
              core.exportVariable('SKIP_COMMENT', 'true');
            }

      - name: Download coordinate results
        if: env.SKIP_COMMENT != 'true'
        uses: actions/download-artifact@v4
        with:
          name: coordinate-preview-results
          path: artifact
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Prepare artifact
        if: env.SKIP_COMMENT != 'true'
        id: unpack
        run: |
          mkdir -p build
          cp artifact/changed-coordinates.json build/
          echo "number=$(cat artifact/pr-number.txt)" >> "$GITHUB_OUTPUT"

      - name: Render coordinate previews
        if: env.SKIP_COMMENT != 'true'
        uses: mpickering/osrs-coord-preview-action@v1.4
        with:
          coordinates-file: build/changed-coordinates.json
          comment: "true"
          pr-number: ${{ steps.unpack.outputs.number }}
          github-token: ${{ github.token }}
          output-dir: build/preview
