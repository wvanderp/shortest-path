name: Dashboard Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shared dashboard site
        run: ./gradlew clean dashboardSite -PclueStepsDashboardDataset=/reachability/clue_locations_full.csv -PtargetsDashboardDataset=/reachability/targets.csv --stacktrace
        shell: bash

      - name: Upload dashboard bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathfinder-dashboard-site
          path: build/reports/pathfinder-dashboard
          if-no-files-found: error

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/reports/pathfinder-dashboard

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
