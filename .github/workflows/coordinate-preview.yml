name: Coordinate Preview

# Compute the set of coordinates introduced by the PR and upload them as an
# artifact.  Rendering and comment posting are handled by the separate
# coordinate-preview-comment.yml workflow_run workflow.
#
# Uses `pull_request` (not `pull_request_target`) so the PR branch version of
# scripts and workflow YAML is used — changes to compute_changed_coordinates.sh
# or this workflow can be tested in PRs.
on:
  pull_request:

jobs:
  preview:
    name: Preview Changed Coordinates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute changed coordinates
        id: compute
        shell: bash
        run: |
          chmod +x scripts/compute_changed_coordinates.sh
          scripts/compute_changed_coordinates.sh "${{ github.event.pull_request.base.ref }}" "$GITHUB_OUTPUT"

      - name: Save PR metadata
        if: steps.compute.outputs.has_changes == 'true'
        shell: bash
        run: |
          mkdir -p artifact
          cp build/changed-coordinates.json artifact/
          echo "${{ github.event.number }}" > artifact/pr-number.txt

      - name: Upload coordinate results
        if: steps.compute.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coordinate-preview-results
          path: artifact/
