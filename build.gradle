plugins {
    id 'java'
}

repositories {
    mavenLocal()
    maven { url = 'https://repo.runelite.net' }
    mavenCentral()
}

def runeLiteVersion = 'latest.release'

dependencies {
    compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'

    testImplementation 'junit:junit:4.12'
    testImplementation 'org.mockito:mockito-core:3.4.6'
    testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
    testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

group = 'shortestpath'
version = '1.17.10'
sourceCompatibility = '1.11'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

test {
    jvmArgs = ['-Xmx2G']
}

// Custom run task for the PluginMessageTest main class (in test sources) with assertions enabled
tasks.register('runRunelite', JavaExec) {
    group = 'application'
    description = 'Runs pathfinder.PluginMessageTest with -ea (assertions) enabled.'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'pathfinder.PluginMessageTest'
    jvmArgs '-ea', '-Xmx2G'
    dependsOn testClasses
}

